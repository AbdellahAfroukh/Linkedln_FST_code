services:
  db:
    image: postgres:17-alpine
    container_name: academic_db
    environment:
      POSTGRES_DB: LINKEDINFST
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database.sql:/docker-entrypoint-initdb.d/01-database.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d LINKEDINFST"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: academic_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/LINKEDINFST
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "PYTHONPATH=/app python scripts/create_admin.py --email admin@example.com --full-name 'Admin User' --password '12345678' || echo 'Admin bootstrap failed, continuing startup'; uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: academic_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
